<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kin — Live Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #0D7377;
    --coral: #E8815E;
    --gold: #F4B860;
    --charcoal: #2D3436;
  }

  body {
    background: #1a1f25;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
    height: 100dvh;
    width: 100vw;
  }

  canvas { display: block; position: fixed; inset: 0; }

  /* Overlay */
  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10;
    background: rgba(26, 31, 37, 0.85);
    backdrop-filter: blur(8px);
    cursor: pointer;
    transition: opacity 0.6s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h2 {
    font-family: Georgia, serif;
    font-size: 2rem;
    color: white;
    margin-bottom: 0.75rem;
  }
  #overlay p {
    color: rgba(255,255,255,0.6);
    font-size: 1.1rem;
    margin-bottom: 2rem;
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }
  #overlay .start-btn {
    background: var(--teal);
    color: white;
    border: none;
    padding: 1rem 2.5rem;
    border-radius: 100px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 4px 24px rgba(13, 115, 119, 0.4);
  }
  #overlay .start-btn:hover { background: #095B5E; transform: scale(1.04); }

  /* Status bar */
  #statusBar {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    z-index: 10;
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.6rem 1.5rem;
    border-radius: 100px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.4s;
  }
  #statusDot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #6B7280;
    transition: background 0.3s;
  }
  #statusDot.listening { background: var(--coral); animation: dotPulse 0.8s ease-in-out infinite; }
  #statusDot.speaking { background: var(--teal); }
  #statusDot.thinking { background: var(--gold); animation: dotPulse 0.6s ease-in-out infinite; }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.6); }
  }
  #statusText {
    color: rgba(255,255,255,0.7);
    font-size: 0.85rem;
    transition: color 0.3s;
  }

  /* Transcript */
  #transcript {
    position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
    z-index: 10; width: 90%; max-width: 500px;
    display: flex; flex-direction: column; gap: 0.75rem;
    pointer-events: none;
  }
  .msg {
    padding: 0.75rem 1rem;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.5;
    animation: msgIn 0.4s ease-out;
    max-width: 85%;
  }
  .msg.user {
    align-self: flex-end;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.9);
    border-bottom-right-radius: 4px;
  }
  .msg.kin {
    align-self: flex-start;
    background: rgba(13, 115, 119, 0.2);
    color: rgba(255,255,255,0.9);
    border-bottom-left-radius: 4px;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.fading { opacity: 0.3; transition: opacity 0.5s; }

  /* Back link */
  #backLink {
    position: fixed; top: 1.5rem; left: 1.5rem; z-index: 20;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
    display: flex; align-items: center; gap: 0.4rem;
  }
  #backLink:hover { color: rgba(255,255,255,0.8); }

  /* Unsupported */
  #unsupported {
    display: none;
    position: fixed; inset: 0; z-index: 30;
    background: rgba(26, 31, 37, 0.95);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem; text-align: center; padding: 2rem;
  }
  #unsupported.show { display: flex; }
  #unsupported h3 { color: white; font-family: Georgia, serif; font-size: 1.5rem; }
  #unsupported p { color: rgba(255,255,255,0.5); max-width: 400px; line-height: 1.6; }

  @media (max-width: 600px) {
    #overlay h2 { font-size: 1.5rem; }
    #statusBar { bottom: 1.5rem; padding: 0.5rem 1rem; }
    .msg { font-size: 0.8rem; max-width: 90%; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<a id="backLink" href="index.html">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Back
</a>

<div id="overlay">
  <h2>Meet Ava</h2>
  <p>Your digital care companion. Click below to start a conversation — she listens, understands, and responds.</p>
  <button class="start-btn" id="startBtn">Start talking</button>
</div>

<div id="transcript"></div>

<div id="statusBar">
  <div id="statusDot"></div>
  <span id="statusText">Click to begin</span>
</div>

<div id="unsupported">
  <h3>Browser not supported</h3>
  <p>This demo uses Web Speech API and WebGL. Please open it in <strong>Chrome</strong> or <strong>Edge</strong> for the full experience.</p>
  <a href="index.html" style="color:var(--teal);">← Back to site</a>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── DOM refs ─────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const transcriptEl = document.getElementById('transcript');
const unsupported = document.getElementById('unsupported');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSpeechAPI = !!SpeechRecognition && !!window.speechSynthesis;
const hasWebGL = (() => {
  try { const c = document.createElement('canvas'); return !!window.WebGLRenderingContext && !!c.getContext('webgl2'); }
  catch(e) { return false; }
})();

if (!hasWebGL || !hasSpeechAPI) {
  unsupported.classList.add('show');
  overlay.style.display = 'none';
}

// ─── State machine ─────────────────────────────────────────────────
const State = { IDLE: 'idle', LISTENING: 'listening', THINKING: 'thinking', SPEAKING: 'speaking' };
let currentState = State.IDLE;
let isActive = false;
let userSpeaking = false;
let silenceTimer = null;
let speechConfirmTimer = null;

function setState(state) {
  currentState = state;
  statusDot.className = state;
  switch (state) {
    case State.IDLE:       statusText.textContent = isActive ? 'Listening...' : 'Click to begin'; break;
    case State.LISTENING:  statusText.textContent = 'Hearing you...'; break;
    case State.THINKING:   statusText.textContent = 'Thinking...'; break;
    case State.SPEAKING:   statusText.textContent = 'Speaking...'; break;
  }
}

// ─── THREE.js setup ────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 20);
camera.position.z = 7;

// Lighting
scene.add(new THREE.AmbientLight(0x334455, 1.5));
const keyLight = new THREE.DirectionalLight(0xffeedd, 3);
keyLight.position.set(2, 3, 5);
scene.add(keyLight);
const rimLight = new THREE.DirectionalLight(0x88ccdd, 2);
rimLight.position.set(-2, -1, -2);
scene.add(rimLight);

// ─── Shaders ───────────────────────────────────────────────────────
const vertexShader = /* glsl */ `
  varying vec3 vNormal;
  varying vec3 vPosition;
  varying float vDisplacement;
  varying vec2 vUv;
  uniform float uTime;
  uniform float uListen;
  uniform float uSpeak;
  uniform float uThink;

  vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
  vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
  vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

  float snoise(vec3 v) {
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
      i.z + vec4(0.0, i1.z, i2.z, 1.0))
    + i.y + vec4(0.0, i1.y, i2.y, 1.0))
    + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.0);
    m = m*m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }

  void main() {
    float n = snoise(position * 1.8 + uTime * 0.35) * 0.07;
    float listenN = snoise(position * 3.5 + uTime * 2.5) * uListen * 0.04;
    float speakN = snoise(position * 2.2 + uTime * 4.0) * uSpeak * 0.1;
    float thinkN = snoise(position * 1.5 + uTime * 1.2) * uThink * 0.03;

    float disp = n + listenN + speakN + thinkN;
    vec3 newPos = position + normal * disp;

    vNormal = normalize(normalMatrix * normal);
    vPosition = newPos;
    vDisplacement = disp;
    vUv = uv;

    gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
  }
`;

const fragmentShader = /* glsl */ `
  varying vec3 vNormal;
  varying vec3 vPosition;
  varying float vDisplacement;
  varying vec2 vUv;
  uniform vec3 uColor1;
  uniform vec3 uColor2;
  uniform vec3 uGlowColor;
  uniform float uTime;
  uniform float uListen;
  uniform float uSpeak;
  uniform float uThink;

  void main() {
    vec3 viewDir = normalize(cameraPosition - vPosition);
    float fresnel = pow(1.0 - abs(dot(vNormal, viewDir)), 2.8);

    // Base gradient from center color to edge glow
    float mixFactor = fresnel * 0.7 + 0.15;
    vec3 color = mix(uColor1, uColor2, mixFactor);

    // Fresnel glow
    float edgeGlow = pow(1.0 - abs(dot(vNormal, viewDir)), 4.5);
    color += uGlowColor * edgeGlow * 0.5;

    // Pulse when listening
    float listenPulse = 1.0 + uListen * 0.12 * sin(uTime * 5.0 + vPosition.y * 8.0);
    color *= listenPulse;

    // Warm up when speaking
    color = mix(color, uGlowColor, uSpeak * 0.25 * fresnel);

    // Subtle thinking shimmer
    color += uGlowColor * uThink * 0.08 * sin(uTime * 3.0 + vPosition.x * 12.0);

    // Slight variation from displacement
    color += vDisplacement * 0.3;

    gl_FragColor = vec4(color, 0.94);
  }
`;

// ─── Character ─────────────────────────────────────────────────────
const charGroup = new THREE.Group();
scene.add(charGroup);

// Body
const bodyGeo = new THREE.SphereGeometry(1.5, 96, 96);
const bodyMat = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms: {
    uTime: { value: 0 },
    uListen: { value: 0 },
    uSpeak: { value: 0 },
    uThink: { value: 0 },
    uColor1: { value: new THREE.Color('#FDF0EB') },
    uColor2: { value: new THREE.Color('#0D7377') },
    uGlowColor: { value: new THREE.Color('#F4B860') },
  },
  transparent: true,
});
const body = new THREE.Mesh(bodyGeo, bodyMat);
charGroup.add(body);

// Outer glow shell
const glowGeo = new THREE.SphereGeometry(1.62, 64, 64);
const glowMat = new THREE.ShaderMaterial({
  vertexShader: /* glsl */ `
    varying vec3 vNormal;
    varying vec3 vPosition;
    void main() {
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vPosition = worldPos.xyz;
      vNormal = normalize(mat3(modelMatrix) * normal);
      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `,
  fragmentShader: /* glsl */ `
    varying vec3 vNormal;
    varying vec3 vPosition;
    uniform vec3 uGlowColor;
    uniform float uIntensity;
    void main() {
      vec3 viewDir = normalize(cameraPosition - vPosition);
      float fresnel = pow(1.0 - abs(dot(vNormal, viewDir)), 5.0);
      float alpha = fresnel * uIntensity * 0.35;
      gl_FragColor = vec4(uGlowColor, alpha);
    }
  `,
  uniforms: {
    uGlowColor: { value: new THREE.Color('#F4B860') },
    uIntensity: { value: 1.0 },
  },
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const glowShell = new THREE.Mesh(glowGeo, glowMat);
charGroup.add(glowShell);

// ─── Stylized friendly eyes (flat discs, not creepy spheres) ──────
function createStylizedEye() {
  const group = new THREE.Group();

  // Main eye shape — soft dark disc
  const eyeShape = new THREE.Shape();
  const w = 0.14, h = 0.18;
  eyeShape.ellipse(0, 0, w, h, 0, Math.PI * 2, false, 0);
  const eyeGeo = new THREE.ShapeGeometry(eyeShape, 32);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x1a3a3c, side: THREE.DoubleSide, depthTest: false, depthWrite: false });
  const eyeDisc = new THREE.Mesh(eyeGeo, eyeMat);
  eyeDisc.renderOrder = 1;
  group.add(eyeDisc);

  // Highlight — small white dot
  const hlShape = new THREE.Shape();
  hlShape.ellipse(0, 0, 0.045, 0.055, 0, Math.PI * 2, false, 0);
  const hlGeo = new THREE.ShapeGeometry(hlShape, 16);
  const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, depthTest: false, depthWrite: false });
  const hl = new THREE.Mesh(hlGeo, hlMat);
  hl.position.set(0.04, 0.06, 0.002);
  hl.renderOrder = 2;
  group.add(hl);

  // Secondary tiny highlight
  const hl2Shape = new THREE.Shape();
  hl2Shape.ellipse(0, 0, 0.02, 0.025, 0, Math.PI * 2, false, 0);
  const hl2Geo = new THREE.ShapeGeometry(hl2Shape, 8);
  const hl2Mat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, depthTest: false, depthWrite: false });
  const hl2 = new THREE.Mesh(hl2Geo, hl2Mat);
  hl2.position.set(-0.03, -0.02, 0.002);
  hl2.renderOrder = 2;
  group.add(hl2);

  return group;
}

const leftEye = createStylizedEye();
leftEye.position.set(-0.42, 0.38, 1.48);
const rightEye = createStylizedEye();
rightEye.position.set(0.42, 0.38, 1.48);
charGroup.add(leftEye);
charGroup.add(rightEye);

// ─── Mouth (integrated curved shape) ───────────────────────────────
const mouthGroup = new THREE.Group();
mouthGroup.position.set(0, -0.28, 1.48);

// Mouth interior — a softly rounded shape
const mouthShape = new THREE.Shape();
mouthShape.ellipse(0, 0, 0.14, 0.06, 0, Math.PI * 2, false, 0);
const mouthGeo = new THREE.ShapeGeometry(mouthShape, 32);
const mouthMat = new THREE.MeshBasicMaterial({ color: 0x1a1515, side: THREE.DoubleSide, depthTest: false, depthWrite: false });
const mouthMesh = new THREE.Mesh(mouthGeo, mouthMat);
mouthMesh.renderOrder = 1;
mouthGroup.add(mouthMesh);

// Subtle lip highlight above
const lipHlShape = new THREE.Shape();
lipHlShape.ellipse(0, 0.05, 0.12, 0.025, 0, Math.PI, false, 0);
const lipHlGeo = new THREE.ShapeGeometry(lipHlShape, 24);
const lipHlMat = new THREE.MeshBasicMaterial({ color: 0xd4a099, side: THREE.DoubleSide, transparent: true, opacity: 0.4, depthTest: false, depthWrite: false });
const lipHl = new THREE.Mesh(lipHlGeo, lipHlMat);
lipHl.renderOrder = 2;
mouthGroup.add(lipHl);

charGroup.add(mouthGroup);

// Smile line (visible when mouth is closed)
const smileGroup = new THREE.Group();
const smileCurve = new THREE.EllipseCurve(0, 0, 0.1, 0.03, 0.15 * Math.PI, 0.85 * Math.PI, false, 0);
const smilePts = smileCurve.getPoints(32);
const smileShape2d = new THREE.Shape();
smileShape2d.moveTo(smilePts[0].x, smilePts[0].y);
for (let i = 1; i < smilePts.length; i++) {
  smileShape2d.lineTo(smilePts[i].x, smilePts[i].y);
}
// Make it a thin stroke by creating an offset
const smilePtsInner = new THREE.EllipseCurve(0, 0, 0.09, 0.02, 0.17 * Math.PI, 0.83 * Math.PI, false, 0).getPoints(32);
for (let i = smilePtsInner.length - 1; i >= 0; i--) {
  smileShape2d.lineTo(smilePtsInner[i].x, smilePtsInner[i].y);
}
const smileGeo = new THREE.ShapeGeometry(smileShape2d, 32);
const smileMat = new THREE.MeshBasicMaterial({ color: 0x3a2824, side: THREE.DoubleSide, depthTest: false, depthWrite: false });
const smileMesh = new THREE.Mesh(smileGeo, smileMat);
smileMesh.renderOrder = 1;
smileGroup.add(smileMesh);
smileGroup.position.copy(mouthGroup.position);
smileGroup.position.z += 0.01;
charGroup.add(smileGroup);

// ─── Particles ─────────────────────────────────────────────────────
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const sizes = new Float32Array(particleCount);
const basePositions = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI;
  const r = 1.8 + Math.random() * 1.8;
  basePositions[i * 3] = Math.sin(phi) * Math.cos(theta) * r;
  basePositions[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * r;
  basePositions[i * 3 + 2] = Math.cos(phi) * r;
  positions[i * 3] = basePositions[i * 3];
  positions[i * 3 + 1] = basePositions[i * 3 + 1];
  positions[i * 3 + 2] = basePositions[i * 3 + 2];
  sizes[i] = 0.015 + Math.random() * 0.06;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

// Particle sprite texture
const spriteCanvas = document.createElement('canvas');
spriteCanvas.width = 64; spriteCanvas.height = 64;
const ctx = spriteCanvas.getContext('2d');
const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
gradient.addColorStop(0, 'rgba(255,255,255,1)');
gradient.addColorStop(0.15, 'rgba(255,240,210,0.8)');
gradient.addColorStop(0.4, 'rgba(244,184,96,0.3)');
gradient.addColorStop(1, 'rgba(0,0,0,0)');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 64, 64);
const spriteTexture = new THREE.CanvasTexture(spriteCanvas);

const particleMat = new THREE.PointsMaterial({
  map: spriteTexture,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  color: 0xF4B860,
  size: 0.12,
});
const particles = new THREE.Points(particleGeo, particleMat);
charGroup.add(particles);

// ─── Audio / VAD ───────────────────────────────────────────────────
let audioCtx = null;
let analyser = null;
let micStream = null;

async function initMic() {
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
  });
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.3;
  const source = audioCtx.createMediaStreamSource(micStream);
  source.connect(analyser);
}

function getRMS() {
  if (!analyser) return 0;
  const data = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
  return Math.sqrt(sum / data.length);
}

// ─── Speech Recognition ────────────────────────────────────────────
let recognition = null;
let finalTranscript = '';
let interimTranscript = '';
let restartRecoTimer = null;

function createAndStartRecognition() {
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }
  const rec = new SpeechRecognition();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'en-US';
  rec.maxAlternatives = 1;

  rec.onresult = (event) => {
    interimTranscript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += ' ' + t;
        finalTranscript = finalTranscript.trim();
        resetSilenceTimer();
      } else {
        interimTranscript += t;
      }
    }
  };

  rec.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    console.warn('Recognition error:', e.error);
  };

  rec.onend = () => {
    // Restart if active and not speaking/thinking
    if (isActive && currentState !== State.SPEAKING && currentState !== State.THINKING) {
      clearTimeout(restartRecoTimer);
      restartRecoTimer = setTimeout(() => {
        if (isActive && currentState !== State.SPEAKING && currentState !== State.THINKING) {
          try { rec.start(); } catch(e) {}
        }
      }, 200);
    }
  };

  recognition = rec;
  finalTranscript = '';
  interimTranscript = '';
  try { rec.start(); } catch(e) {}
}

function pauseRecognition() {
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }
}

function resumeRecognition() {
  finalTranscript = '';
  interimTranscript = '';
  if (recognition) {
    try { recognition.start(); } catch(e) {
      // If restarting fails, create fresh
      createAndStartRecognition();
    }
  } else {
    createAndStartRecognition();
  }
}

// ─── VAD + Silence detection ───────────────────────────────────────
const VAD_THRESHOLD = 0.012;
const SILENCE_MS = 1500;
const SPEECH_CONFIRM_MS = 300;

function resetSilenceTimer() {
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(onSilenceDetected, SILENCE_MS);
}

function onSilenceDetected() {
  if (!userSpeaking) return;
  userSpeaking = false;

  const transcript = (finalTranscript + ' ' + interimTranscript).trim();
  if (transcript.length > 1) {
    // Pause recognition while processing
    pauseRecognition();
    handleUserSpeech(transcript);
  } else {
    setState(State.IDLE);
  }
}

async function handleUserSpeech(text) {
  addTranscript('user', text);
  setState(State.THINKING);

  const thinkTime = 600 + text.length * 15 + Math.random() * 500;
  await new Promise(r => setTimeout(r, thinkTime));

  const response = conversationEngine.generateResponse(text);
  await speakResponse(response);

  // Resume listening
  if (isActive) {
    setState(State.IDLE);
    resumeRecognition();
  }
}

// Monitor VAD — runs via rAF, detects speech start from mic energy
function vadLoop() {
  if (!isActive || currentState === State.SPEAKING || currentState === State.THINKING) {
    requestAnimationFrame(vadLoop);
    return;
  }

  const rms = getRMS();

  if (rms > VAD_THRESHOLD && !userSpeaking) {
    clearTimeout(speechConfirmTimer);
    speechConfirmTimer = setTimeout(() => {
      if (!userSpeaking && isActive) {
        userSpeaking = true;
        setState(State.LISTENING);
        resetSilenceTimer();
      }
    }, SPEECH_CONFIRM_MS);
  } else if (userSpeaking) {
    resetSilenceTimer();
  }

  requestAnimationFrame(vadLoop);
}

// ─── Speech Synthesis + Lip Sync ───────────────────────────────────
function speakResponse(text) {
  return new Promise((resolve) => {
    setState(State.SPEAKING);
    addTranscript('kin', text);

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.9;
    utterance.pitch = 1.08;
    utterance.volume = 1;

    const voices = speechSynthesis.getVoices();
    const pref = voices.find(v => v.name.includes('Samantha') || v.name.includes('Karen')
      || (v.name.includes('Female') && v.name.includes('en-US'))
      || v.name.includes('Zira'));
    if (pref) utterance.voice = pref;

    // Build viseme sequence
    const visemes = textToVisemes(text);
    let visemeIdx = 0;
    const estimatedDuration = text.length * 55;
    const visemeInterval = Math.max(estimatedDuration / Math.max(visemes.length, 1), 50);

    let visemeTimer = null;

    utterance.onboundary = (e) => {
      if (e.charIndex !== undefined && visemes.length > 0) {
        visemeIdx = Math.min(
          Math.floor((e.charIndex / text.length) * visemes.length),
          visemes.length - 1
        );
      }
    };

    utterance.onstart = () => {
      visemeTimer = setInterval(() => {
        if (visemeIdx < visemes.length) {
          applyViseme(visemes[visemeIdx]);
          visemeIdx++;
        }
      }, visemeInterval);
    };

    utterance.onend = () => {
      clearInterval(visemeTimer);
      applyViseme({ h: 0.12, w: 1.0, r: 0.0 });
      resolve();
    };

    utterance.onerror = () => {
      clearInterval(visemeTimer);
      applyViseme({ h: 0.12, w: 1.0, r: 0.0 });
      resolve();
    };

    speechSynthesis.speak(utterance);
  });
}

// Simple grapheme-to-viseme
function textToVisemes(text) {
  const lower = text.toLowerCase();
  const visemes = [];
  const map = {
    'aa': {h:0.85,w:1.0,r:0.0}, 'ah': {h:0.7,w:1.0,r:0.0}, 'ae': {h:0.65,w:1.2,r:0.0},
    'ao': {h:0.6,w:0.8,r:0.4}, 'aw': {h:0.55,w:0.7,r:0.5}, 'ay': {h:0.5,w:1.1,r:0.0},
    'ee': {h:0.35,w:1.4,r:0.0}, 'eh': {h:0.5,w:1.1,r:0.0}, 'er': {h:0.4,w:1.0,r:0.2},
    'ey': {h:0.4,w:1.2,r:0.0}, 'ih': {h:0.35,w:1.1,r:0.0}, 'iy': {h:0.3,w:1.4,r:0.0},
    'oh': {h:0.55,w:0.7,r:0.5}, 'ow': {h:0.5,w:0.65,r:0.6}, 'oy': {h:0.5,w:0.7,r:0.5},
    'uh': {h:0.35,w:0.7,r:0.4}, 'uw': {h:0.3,w:0.55,r:0.7},
    'b': {h:0.0,w:1.0,r:0.0}, 'p': {h:0.0,w:1.0,r:0.0}, 'm': {h:0.0,w:1.0,r:0.0},
    'f': {h:0.15,w:0.8,r:0.0}, 'v': {h:0.15,w:0.8,r:0.0},
    'th': {h:0.2,w:1.1,r:0.0}, 'dh': {h:0.2,w:1.1,r:0.0},
    's': {h:0.2,w:1.2,r:0.0}, 'z': {h:0.2,w:1.2,r:0.0},
    'sh': {h:0.3,w:0.8,r:0.3}, 'ch': {h:0.3,w:0.8,r:0.3}, 'jh': {h:0.3,w:0.8,r:0.3},
    'l': {h:0.4,w:1.0,r:0.0}, 'r': {h:0.35,w:0.9,r:0.2}, 'w': {h:0.3,w:0.55,r:0.6},
    'y': {h:0.3,w:1.3,r:0.0}, 'n': {h:0.15,w:1.0,r:0.0}, 'ng': {h:0.2,w:1.0,r:0.0},
    't': {h:0.2,w:1.0,r:0.0}, 'd': {h:0.2,w:1.0,r:0.0}, 'k': {h:0.25,w:1.0,r:0.0},
    'g': {h:0.25,w:1.0,r:0.0}, 'hh': {h:0.5,w:1.0,r:0.0},
  };

  const defaultVis = {h:0.4,w:1.0,r:0.0};
  let i = 0;
  while (i < lower.length) {
    let matched = null;
    for (const [key, vis] of Object.entries(map)) {
      if (lower.startsWith(key, i) && (!matched || key.length > matched.len)) {
        matched = { vis, len: key.length };
      }
    }
    if (matched) {
      visemes.push(matched.vis);
      i += matched.len;
    } else {
      visemes.push(defaultVis);
      i++;
    }
  }
  return visemes.length > 0 ? visemes : [defaultVis];
}

// Current viseme target — smoothly interpolated in animation loop
let targetViseme = { h: 0.12, w: 1.0, r: 0.0 };

function applyViseme(v) {
  targetViseme = v;
}

// ─── Conversation Engine ───────────────────────────────────────────
class ConversationEngine {
  constructor() {
    this.memory = {};
    this.turnCount = 0;
    this.mood = 0.6;
    this.topics = [];
  }

  generateResponse(input) {
    this.turnCount++;
    const lower = input.toLowerCase().trim();

    // Extract name
    const nameMatch = lower.match(/(?:my name is|i'm|i am) (\w+)/);
    if (nameMatch) this.memory.name = nameMatch[1];

    // Update mood based on sentiment
    const positive = lower.match(/\b(good|great|happy|love|wonderful|amazing|excellent|fantastic|beautiful)\b/g);
    const negative = lower.match(/\b(bad|sad|terrible|awful|horrible|stressed|anxious|worried|upset|angry)\b/g);
    if (positive) this.mood = Math.min(1, this.mood + 0.08 * positive.length);
    if (negative) this.mood = Math.max(0.1, this.mood - 0.1 * negative.length);

    // Track topics
    const topicWords = lower.match(/\b(work|job|family|health|music|art|food|travel|nature|books|movies|tech|science)\b/g);
    if (topicWords) topicWords.forEach(t => { if (!this.topics.includes(t)) this.topics.push(t); });

    return this.route(lower);
  }

  route(input) {
    const n = this.memory.name || '';

    if (input.match(/\b(hello|hi|hey|good morning|good afternoon|good evening|howdy|yo)\b/)) {

        `Hi${n ? ' ' + n : ' there'}! It's so nice to hear your voice. How are you doing today?`,
        `Hello${n ? ' ' + n : ''}! I was hoping you'd stop by. How's your day going?`,

        `Well hello! Your voice is a welcome sound. How are you feeling?`,

      return this.pick([
        `I'm feeling wonderful, thank you for asking! Every conversation is a little gift. How about you — how are things?`,

  }

  pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }
}

const conversationEngine = new ConversationEngine();

// ─── Transcript UI ─────────────────────────────────────────────────
function addTranscript(who, text) {
  const el = document.createElement('div');
  el.className = `msg ${who}`;
  el.textContent = text;
  transcriptEl.appendChild(el);

  // Fade older messages
  const msgs = transcriptEl.querySelectorAll('.msg');
  if (msgs.length > 5) {
    for (let i = 0; i < msgs.length - 5; i++) {
      msgs[i].classList.add('fading');
    }
  }
  if (msgs.length > 8) {
    msgs[0].remove();
  }

  // Scroll
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

// ─── Animation loop ────────────────────────────────────────────────
const clock = new THREE.Clock();
let currentMouthY = 0.08; // tracked for smooth interpolation

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const t = performance.now() * 0.001;

  // Update shader uniforms
  const listenTarget = currentState === State.LISTENING ? 1 : 0;
  const speakTarget = currentState === State.SPEAKING ? 1 : 0;
  const thinkTarget = currentState === State.THINKING ? 1 : 0;

  bodyMat.uniforms.uTime.value = t;
  bodyMat.uniforms.uListen.value += (listenTarget - bodyMat.uniforms.uListen.value) * 4 * dt;
  bodyMat.uniforms.uSpeak.value += (speakTarget - bodyMat.uniforms.uSpeak.value) * 4 * dt;
  bodyMat.uniforms.uThink.value += (thinkTarget - bodyMat.uniforms.uThink.value) * 4 * dt;

  // Glow intensity
  glowMat.uniforms.uIntensity.value = 1.0 + bodyMat.uniforms.uSpeak.value * 0.6
    + bodyMat.uniforms.uListen.value * 0.3;

  // ── Eyes (flat discs) ────────────────────────────────────────────
  const blinkCycle = Math.sin(t * 0.41 + 0.3) * 0.5 + 0.5;
  const shouldBlink = blinkCycle > 0.978;

  // Quick blink — fast close, fast open, don't go too thin
  const blinkTarget = shouldBlink ? 0.12 : 1.0;
  const blinkSpeed = shouldBlink ? 0.7 : 0.35;
  [leftEye, rightEye].forEach(eye => {
    eye.scale.y += (blinkTarget - eye.scale.y) * blinkSpeed;
    eye.scale.x += (1.0 - eye.scale.x) * 0.2;
  });

  // Widen when listening
  const listenWide = 1.0 + bodyMat.uniforms.uListen.value * 0.18;
  leftEye.scale.set(
    leftEye.scale.x * 0.9 + listenWide * 0.1,
    leftEye.scale.y,
    1
  );
  rightEye.scale.set(
    rightEye.scale.x * 0.9 + listenWide * 0.1,
    rightEye.scale.y,
    1
  );

  // Gentle gaze — slight position shift
  const gazeX = Math.sin(t * 0.7) * 0.012 + Math.sin(t * 1.3) * 0.008;
  const gazeY = Math.cos(t * 0.8) * 0.008 + Math.cos(t * 1.1) * 0.006;
  leftEye.position.x = -0.42 + gazeX;
  leftEye.position.y = 0.38 + gazeY;
  rightEye.position.x = 0.42 + gazeX;
  rightEye.position.y = 0.38 + gazeY;

  // ── Mouth — smooth viseme interpolation ──────────────────────────
  const mouthTargetY = targetViseme.h * 1.6 + 0.04;
  const mouthTargetX = targetViseme.w * 0.8 + 0.2;
  currentMouthY += (mouthTargetY - currentMouthY) * 18 * dt;
  mouthGroup.scale.set(
    mouthGroup.scale.x + (mouthTargetX - mouthGroup.scale.x) * 12 * dt,
    currentMouthY,
    1
  );

  // Smile line visible when mouth is closed, fade when speaking
  const mouthOpenAmount = currentMouthY / 0.5; // 0 = closed, 1+ = open
  smileGroup.visible = mouthOpenAmount < 0.35;
  smileMesh.material.opacity = Math.max(0, 1 - mouthOpenAmount * 3);

  // Mouth interior only visible when open
  mouthMesh.visible = currentMouthY > 0.06;
  lipHl.visible = currentMouthY > 0.06;

  // ── Particles ────────────────────────────────────────────────────
  const posArr = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    const i3 = i * 3;
    const bx = basePositions[i3];
    const by = basePositions[i3 + 1];
    const bz = basePositions[i3 + 2];

    const orbitSpeed = 0.3 + (i % 5) * 0.08;
    const angle = t * orbitSpeed + i * 0.5;
    const driftR = 0.08 + bodyMat.uniforms.uSpeak.value * 0.2;

    posArr[i3] = bx + Math.cos(angle) * driftR + Math.sin(t * 0.4 + i) * 0.04;
    posArr[i3 + 1] = by + Math.sin(angle * 0.7) * driftR + Math.cos(t * 0.5 + i) * 0.04;
    posArr[i3 + 2] = bz + Math.cos(angle * 0.6) * driftR;

    if (bodyMat.uniforms.uListen.value > 0.1) {
      const dist = Math.sqrt(bx*bx + by*by + bz*bz);
      const nx = bx / dist, ny = by / dist, nz = bz / dist;
      const pull = bodyMat.uniforms.uListen.value * 0.2;
      posArr[i3] -= nx * pull;
      posArr[i3 + 1] -= ny * pull;
      posArr[i3 + 2] -= nz * pull;
    }
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // ── Character motion ─────────────────────────────────────────────
  charGroup.rotation.y = Math.sin(t * 0.25) * 0.08;
  charGroup.rotation.x = Math.sin(t * 0.3) * 0.03;

  const breathe = 1.0 + Math.sin(t * 0.6) * 0.008;
  charGroup.scale.setScalar(breathe);

  renderer.render(scene, camera);
}

// ─── Init ──────────────────────────────────────────────────────────
async function init() {
  // Preload voices
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

  // Start render loop
  animate();

  // Start sequence — request mic, greet, then begin continuous listening
  async function start() {
    if (isActive) return;
    try {
      await initMic();
      isActive = true;
      overlay.classList.add('hidden');
      setState(State.THINKING);
      await new Promise(r => setTimeout(r, 800));
      const greeting = conversationEngine.pick([
        "Hi there! I'm Ava. It's so nice to meet you. How are you doing today?",
        "Hello! I'm Ava, your digital companion. I've been looking forward to talking with you. How's your day going?",
      ]);
      await speakResponse(greeting);
      setState(State.IDLE);
      createAndStartRecognition();
      vadLoop();
    } catch (e) {
      console.error('Mic access failed:', e);
      setState(State.IDLE);
      statusText.textContent = 'Microphone access needed';
    }
  }

  startBtn.addEventListener('click', start);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay || e.target === startBtn) start();
  });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && e.target === document.body && !isActive) {
      e.preventDefault();
      start();
    }
  });

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
}

init();
</script>
